      <p>地域の負荷は、地図に出ないことがある。交通、役所の距離、相談先の少なさ、担い手の偏りは、日常の中で静かに積み上がる。</p>
      <p>社会分析では、この見えない負荷を言語化することで、議論の出発点を整える。</p>
      <p>見えないものは、見えるように書くしかない。</p>
