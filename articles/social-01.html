      <div class="meta-row">

        <span class="chip">カテゴリ: 社会分析</span>

      <p>制度は存在するだけでは届かない。申請の手順、周知の仕方、使う側の余力によって、届く人と届かない人が分かれる。</p>
      <p>社会分析では、制度の理想よりも、実際の到達範囲を先に見る必要がある。</p>
      <p>誰に届いていないかを見つけることが、分析の出発点になる。</p>
