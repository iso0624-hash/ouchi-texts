      <p>AI を前提にすると、評論は長文の独占ではなくなる。資料整理、対案の列挙、反論の準備がやりやすくなるからだ。</p>
      <p>そのぶん、最終的に何を自分の言葉として残すかが重要になる。道具が速くても、判断は省けない。</p>
      <p>評論の書き方は、道具で変わるが、責任の置き方は変わらない。</p>
